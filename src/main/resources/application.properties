spring.application.name=gateway-service
server.port=${PORT:8080}

# Ollama LLM Configuration
spring.ai.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${MODEL_NAME:gemma3:4b}

# Microservice URLs
service.policy.url=${POLICY_URL:http://localhost:8081}
service.customer.url=${CUSTOMER_URL:http://localhost:8082}
service.vehicle.url=${VEHICLE_URL:http://localhost:8083}
service.cover.url=${COVER_URL:http://localhost:8084}

# WebClient timeouts
spring.webflux.client.connect-timeout=5000
spring.webflux.client.read-timeout=10000
