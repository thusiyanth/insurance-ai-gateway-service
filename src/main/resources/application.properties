spring.application.name=gateway-service
server.port=8080

# Ollama LLM Configuration
spring.ai.ollama.base-url=${OLLAMA_URL}
spring.ai.ollama.chat.model=gemma3:4b

# Microservice URLs
service.policy.url=${POLICY_URL}
service.customer.url=${CUSTOMER_URL}
service.vehicle.url=${VEHICLE_URL}
service.cover.url=${COVER_URL}

# WebClient timeouts
spring.webflux.client.connect-timeout=5000
spring.webflux.client.read-timeout=10000
